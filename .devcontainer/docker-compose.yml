services:
  agentic-shop:
    build:
      context: ../
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/postgres-agentic-shop:cached
    ports:
      - "8000:8000"
      - "5173:5173"
    networks:
      - agentic-net

networks:
  agentic-net:
    name: agentic-net
    driver: bridge
